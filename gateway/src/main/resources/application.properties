spring.application.name=gateway
server.port=8560

spring.config.import=optional:configserver:http://config-server:8888

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=ordonnance-service
spring.cloud.gateway.routes[0].uri=lb://ordonnance-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/ordonnances/**

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://notification-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notifications/**

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/medilink
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

management.endpoints.web.exposure.include=*
